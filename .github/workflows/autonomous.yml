name: Autonomous Exploration

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # === Ollama setup (this was the missing piece) ===
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: ollama serve &

      - name: Wait for Ollama
        run: sleep 10

      - name: Pull model
        run: ollama pull llama3.2:1b   # tiny & fast for CI (change to llama3.2 if you want the full one)

      # === Run the mind ===
      - name: Run headless autonomous explorer
        run: python mind.py --headless

      # Debug output (always shows)
      - name: Show logs
        if: always()
        run: cat logs/autonomous.log 2>/dev/null || echo "No log file - check mind.py output"
